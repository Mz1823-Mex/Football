name: 15-Min Value Bet Scanner

on:
  schedule:
    - cron: '*/15 * * * *'  # Ejecutar cada 15 minutos
  workflow_dispatch:      # Permitir ejecución manual

jobs:
  scan-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv python-telegram-bot numpy scipy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Value Bet Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.YOUR_API_KEY }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python buscador_mercados.py
