name: Buscador de Mercados de Alta Probabilidad

on:
  schedule:
    # Ejecución automática todos los días a las 05:00 AM UTC
    - cron: '0 5 * * *'

  # Permite ejecución manual desde la interfaz web de GitHub (incluida móvil)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  buscar-mercados:
    name: Ejecutar Buscador de Mercados iSportsAPI
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────────────────────────────
      # 1. Clonar el repositorio
      # ─────────────────────────────────────────────────────────────────────
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ─────────────────────────────────────────────────────────────────────
      # 2. Configurar Python 3.11
      # ─────────────────────────────────────────────────────────────────────
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ─────────────────────────────────────────────────────────────────────
      # 3. Instalar dependencias
      # ─────────────────────────────────────────────────────────────────────
      - name: Instalar dependencias de Python
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      # ─────────────────────────────────────────────────────────────────────
      # 4. Ejecutar el script de búsqueda de mercados
      # ─────────────────────────────────────────────────────────────────────
      - name: Ejecutar buscador_mercados.py
        env:
          YOUR_API_KEY: ${{ secrets.YOUR_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python buscador_mercados.py

      # ─────────────────────────────────────────────────────────────────────
      # 5. Verificar si hay cambios en el archivo de salida
      # ─────────────────────────────────────────────────────────────────────
      - name: Verificar cambios en partidos_alta_probabilidad.md
        id: verify_changes
        run: |
          if git diff --quiet -- partidos_alta_probabilidad.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No se detectaron cambios en partidos_alta_probabilidad.md"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Se detectaron cambios en partidos_alta_probabilidad.md"
          fi

      # ─────────────────────────────────────────────────────────────────────
      # 6. Configurar Git
      # ─────────────────────────────────────────────────────────────────────
      - name: Configurar Git
        if: steps.verify_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ─────────────────────────────────────────────────────────────────────
      # 7. Agregar, commitear y pushear el archivo actualizado
      # ─────────────────────────────────────────────────────────────────────
      - name: Commit y Push de partidos_alta_probabilidad.md
        if: steps.verify_changes.outputs.changed == 'true'
        run: |
          git add partidos_alta_probabilidad.md
          git commit -m "📊 Actualización automática de mercados de alta probabilidad — $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push origin ${{ github.ref_name }}
