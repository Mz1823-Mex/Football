name: Buscador de Mercados de Alta Probabilidad

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  buscar-mercados:
    name: Ejecutar Buscador de Mercados iSportsAPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias de Python
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Ejecutar buscador_mercados.py
        env:
          YOUR_API_KEY: ${{ secrets.YOUR_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python buscador_mercados.py

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit y Push de cambios
        run: |
          git add partidos_alta_probabilidad.md
          # Verificar si hay cambios staged (incluye archivos nuevos)
          if git diff --cached --quiet; then
            echo "No hay cambios para commitear."
          else
            git commit -m "📊 Actualización automática — $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin ${{ github.ref_name }}
          fi
